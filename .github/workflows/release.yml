name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build addon zip
        shell: pwsh
        run: ./scripts/Build-Release.ps1

      - name: Upload GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
